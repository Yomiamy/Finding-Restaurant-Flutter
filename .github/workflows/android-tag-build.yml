name: Android Build & Deploy

on:
  push:
    tags:
      - 'rc/android-**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version in format x.y.z(code), e.g., 1.3.0(123)'
        required: false
      deploy_to_firebase:
        description: 'Deploy to Firebase App Distribution'
        required: false
        type: boolean
        default: false
      release_notes:
        description: 'Release notes for Firebase distribution'
        required: false
        default: 'Beta build from GitHub Actions'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        working-directory: flutter_restaruant/flutter_restaruant
        run: flutter pub get

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: flutter_restaruant/flutter_restaruant/android

      - name: Install Fastlane
        working-directory: flutter_restaruant/flutter_restaruant/android
        run: |
          gem install bundler
          bundle install

      - name: Decode signing keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        working-directory: flutter_restaruant/flutter_restaruant/android
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks

      - name: Decode Firebase credentials
        if: github.event.inputs.deploy_to_firebase == 'true' || github.event_name == 'push'
        env:
          FIREBASE_CREDENTIALS_BASE64: ${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}
        working-directory: flutter_restaruant/flutter_restaruant/android/fastlane
        run: |
          echo "$FIREBASE_CREDENTIALS_BASE64" | base64 -d > findrestaurant_credentials.json

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # 從 tag 格式 rc/android-x.y.z(oooo) 中提取
            TAG_NAME=${GITHUB_REF#refs/tags/}
            VERSION_FULL=${GITHUB_REF#refs/tags/rc/android-}

            # 使用正則表達式提取 version name (x.y.z) 和 version code (oooo)
            if [[ $VERSION_FULL =~ ^([0-9]+\.[0-9]+\.[0-9]+)\(([0-9]+)\)$ ]]; then
              VERSION_NAME="${BASH_REMATCH[1]}"
              VERSION_CODE="${BASH_REMATCH[2]}"
            else
              echo "❌ Tag 格式錯誤: 應該是 rc/android-x.y.z(oooo)"
              exit 1
            fi
          else
            # 手動觸發時使用輸入值或預設值
            VERSION_INPUT="${{ github.event.inputs.version || 'manual' }}"
            TAG_NAME="manual-build"

            if [[ $VERSION_INPUT =~ ^([0-9]+\.[0-9]+\.[0-9]+)\(([0-9]+)\)$ ]]; then
              VERSION_NAME="${BASH_REMATCH[1]}"
              VERSION_CODE="${BASH_REMATCH[2]}"
            else
              VERSION_NAME="1.0.0"
              VERSION_CODE="1"
            fi
          fi

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

          echo "✅ 提取版本資訊:"
          echo "   Version Name: $VERSION_NAME"
          echo "   Version Code: $VERSION_CODE"
          echo "   Tag: $TAG_NAME"

      - name: Build and Upload to Firebase
        if: github.event.inputs.deploy_to_firebase == 'true' || github.event_name == 'push'
        working-directory: flutter_restaruant/flutter_restaruant/android
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_FILE: release-keystore.jks
          RELEASE_NOTES: ${{ github.event.inputs.release_notes || format('Release {0}({1}) - Build from tag {2}', steps.version.outputs.version_name, steps.version.outputs.version_code, steps.version.outputs.tag) }}
        run: |
          echo "🚀 開始建置 APK - Version: $VERSION_NAME ($VERSION_CODE)"
          bundle exec fastlane build_apk_and_upload

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          path: flutter_restaruant/flutter_restaruant/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Cleanup sensitive files
        if: always()
        working-directory: flutter_restaruant/flutter_restaruant/android
        run: |
          rm -f app/release-keystore.jks
          rm -f key.properties
          rm -f fastlane/findrestaurant_credentials.json

      - name: Create Release Summary
        run: |
          echo "🎉 Android Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version Name**: ${{ steps.version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version Code**: ${{ steps.version.outputs.version_code }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.deploy_to_firebase }}" == "true" ] || [ "${{ github.event_name }}" == "push" ]; then
            echo "🚀 已部署到 Firebase App Distribution" >> $GITHUB_STEP_SUMMARY
            echo "📥 測試人員將收到 Firebase 通知" >> $GITHUB_STEP_SUMMARY
          else
            echo "📥 APK 已上傳為 artifact,請到 Actions 頁面下載" >> $GITHUB_STEP_SUMMARY
          fi
