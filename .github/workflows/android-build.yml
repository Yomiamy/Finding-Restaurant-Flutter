name: Android Build CI/CD

on:
  push:
    tags:
      - 'v*'  # 只在創建 tag 時觸發，如 v1.3.0

env:
  FLUTTER_VERSION: '3.32.8'
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Xmx4096m -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1G"'  # 🚀 增加 JVM 記憶體

jobs:
  build:
    name: Build Android APK and AAB
    runs-on: ubuntu-latest

    steps:
      # 1. 檢出代碼
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      # 2. 設置 Java 環境
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      # 3. 設置 Flutter SDK
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      # 4. 驗證 Flutter 安裝
      - name: Verify Flutter installation
        run: |
          flutter --version
          flutter doctor -v

      # 5. 安裝依賴
      - name: Install Flutter dependencies
        working-directory: flutter_restaruant/flutter_restaruant
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs

      # 6. 配置簽名
      - name: Configure Android signing
        working-directory: flutter_restaruant/flutter_restaruant/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          mkdir -p app
          echo "$KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks
          cat > key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release-keystore.jks
          EOF
          echo "✅ Signing configuration completed"

      # 7. 增加 swap（避免記憶體爆掉）
      - name: Increase Swap Space
        run: |
          sudo fallocate -l 6G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
          echo "✅ Swap memory enabled"

      # 8. 構建 APK
      - name: Build Release APK
        working-directory: flutter_restaruant/flutter_restaruant
        env:
          GRADLE_OPTS: ${{ env.GRADLE_OPTS }}
        run: |
          flutter build apk --release --verbose
          echo "✅ APK build completed"

      # 9. 構建 AAB
      - name: Build Release AAB
        working-directory: flutter_restaruant/flutter_restaruant
        env:
          GRADLE_OPTS: ${{ env.GRADLE_OPTS }}
        run: |
          flutter build appbundle --release --verbose
          echo "✅ AAB build completed"

      # 10. 重命名
      - name: Rename build artifacts
        working-directory: flutter_restaruant/flutter_restaruant
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/flutter-restaruant-v${VERSION}.apk
          cp build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/flutter-restaruant-v${VERSION}.aab
          echo "✅ Artifacts renamed with version: $VERSION"

      # 11. 上傳 APK / AAB
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-restaruant-apk-${{ github.ref_name }}
          path: flutter_restaruant/build/app/outputs/flutter-apk/flutter-restaruant-*.apk
          retention-days: 7

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: flutter-restaruant-aab-${{ github.ref_name }}
          path: flutter_restaruant/build/app/outputs/bundle/release/flutter-restaruant-*.aab
          retention-days: 7

      # 12. 建立 Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            flutter_restaruant/build/app/outputs/flutter-apk/flutter-restaruant-*.apk
            flutter_restaruant/build/app/outputs/bundle/release/flutter-restaruant-*.aab
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 📱 Flutter Restaurant App - Release ${{ github.ref_name }}
            ### 📦 構建產物
            - **APK**: 測試用
            - **AAB**: Play Store 發佈用
            ### 🔧 構建資訊
            - Flutter Version: ${{ env.FLUTTER_VERSION }}
            - Build Date: ${{ github.event.head_commit.timestamp }}
            - Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 13. 清理敏感文件
      - name: Cleanup
        if: always()
        working-directory: flutter_restaruant/flutter_restaruant/android
        run: |
          rm -f app/release-keystore.jks key.properties
          echo "✅ Cleanup completed"
