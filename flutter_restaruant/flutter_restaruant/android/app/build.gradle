plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    //id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterApplicationId = project.findProperty("applicationId") ?: "com.yomi.flutter_restaruant"
def flutterVersionCode = System.getenv("VERSION_CODE") ?: localProperties.getProperty('flutter.versionCode')
def flutterVersionName = System.getenv("VERSION_NAME") ?: localProperties.getProperty('flutter.versionName')
def KEY_ALIAS = System.getenv("KEY_ALIAS") ?: localProperties.getProperty("keyAlias")
def KEY_PASSWORD = System.getenv("KEY_PASSWORD") ?: localProperties.getProperty("keyPassword")
def STORE_FILE = System.getenv("KEYSTORE_FILE") ?: localProperties.getProperty("storeFile")
def STORE_PASSWORD = System.getenv("KEYSTORE_PASSWORD") ?: localProperties.getProperty("storePassword")

android {

    signingConfigs {
        release {
            if(STORE_FILE != null) {
                keyAlias KEY_ALIAS
                keyPassword KEY_PASSWORD
                storeFile file(STORE_FILE)
                storePassword STORE_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
        }
        release {
            signingConfig signingConfigs.release
        }
    }

    namespace 'com.yomi.flutter_restaruant'
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion = "28.2.13676358"

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId flutterApplicationId
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    lintOptions {
        disable 'InvalidPackage'
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = 17
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
    implementation 'com.google.android.material:material:1.12.0'
}
